# Contactly CI — the course-project test suite.
#
# The repo's root `deploy.yml` workflow targets the standalone marketing app
# at the repo root. Contactly lives under `course/contactly/` as a separate
# pnpm project and has its own typecheck + unit suite (and a growing
# Playwright suite).
#
# This workflow runs on every push/PR that TOUCHES `course/contactly/**`
# (or this workflow file itself). Lessons that don't touch contactly files
# don't pay the cost. Lessons that do — including the Module 12 cassette
# scenarios — get a green check before review.
name: Contactly CI

on:
  push:
    branches: [main]
    paths:
      - 'course/contactly/**'
      - '.github/workflows/contactly-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'course/contactly/**'
      - '.github/workflows/contactly-ci.yml'

# Cancel in-flight runs on the same ref when a new push/PR arrives. PR
# workflows during active development churn through dozens of commits;
# only the latest matters.
concurrency:
  group: contactly-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contactly:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    # `working-directory` defaults so every run-step targets the contactly
    # project without `cd course/contactly` boilerplate. Steps that need
    # to operate elsewhere (none here today) override per-step.
    defaults:
      run:
        working-directory: course/contactly
    # Placeholder env vars so `$env/static/*` modules type-check in CI
    # WITHOUT real secrets ever reaching the runner. The unit suite mocks
    # `$lib/server/env`, the Module 12 cassette tests mock the entire Stripe
    # signing secret, and the Playwright suite (when added) hits a
    # bring-your-own-test-database — none of these need live secrets.
    env:
      PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      PUBLIC_APP_NAME: Contactly
      PUBLIC_APP_URL: http://localhost:5173
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
      RESEND_API_KEY: re_ci_placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Pin Node to the same major Vercel deploys against (`nodejs22.x` in
      # `svelte.config.js`). Anything older changes Web Crypto availability
      # in undici and can introduce phantom Stripe signature mismatches.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: course/contactly/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync SvelteKit
        run: pnpm exec svelte-kit sync

      # Lint + typecheck + unit suite, in CI order. Each step's failure
      # is independently surfaced in the PR check list, so reviewers see
      # which gate failed without expanding the full log.
      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run check

      - name: Unit tests
        run: pnpm exec vitest run

  # ---------------------------------------------------------------------
  # Cassette validation — a focused job for Module 12.
  #
  # Validates every JSON file under `src/lib/testing/cassettes/` against
  # the Zod schema in `cassette.ts`. Catches malformed cassettes that
  # slipped past local review (offset reordering, duplicate event ids,
  # apiVersion typos, missing fields) without re-running the full suite.
  #
  # Runs in parallel with the main `contactly` job so a cassette-only
  # change finishes a CI cycle in ~30 s vs ~3 min.
  # ---------------------------------------------------------------------
  cassette-validation:
    name: Validate Stripe webhook cassettes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: course/contactly
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: course/contactly/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Re-uses the existing cassette-loader's "sweep every cassette on
      # disk" test — it iterates `listCassettes()` and runs each through
      # `parseCassetteOrThrow`. A new cassette file added to the
      # directory is auto-included; no test-file edit needed.
      - name: Validate every cassette parses
        run: |
          pnpm exec svelte-kit sync
          pnpm exec vitest run \
            src/lib/testing/cassette.test.ts \
            src/lib/testing/cassette-loader.test.ts
